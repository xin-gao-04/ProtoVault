name: ci

on:
  push:
  pull_request:

jobs:
  typescript:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  cpp:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: cmake -S services/protocol-core -B services/protocol-core/build
      - run: cmake --build services/protocol-core/build --config Release
      - run: ctest --test-dir services/protocol-core/build -C Release --output-on-failure

